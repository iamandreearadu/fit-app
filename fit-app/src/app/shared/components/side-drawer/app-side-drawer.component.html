<!-- Backdrop -->
@if (open) {
  <div
    class="global-drawer-backdrop"
    (click)="close()"
    aria-hidden="true">
  </div>
}

<!-- Drawer panel -->
<aside
  class="global-drawer"
  [class.global-drawer--open]="open"
  [attr.inert]="open ? null : ''"
  role="dialog"
  aria-label="Navigation menu"
  aria-modal="true">

  <!-- Header: user avatar + info + close -->
  <div class="global-drawer-header">
    <div class="global-drawer-header-tap" (click)="navigateToProfile()" role="button" tabindex="0"
         (keydown.enter)="navigateToProfile()" aria-label="Go to your profile">
      <div class="global-drawer-avatar">
        @if (userAvatar()) {
          <img [src]="userAvatar()" alt="Your profile" />
        } @else {
          <span class="global-drawer-avatar-initials">{{ userInitials() }}</span>
        }
      </div>
      <div class="global-drawer-user-info">
        <span class="global-drawer-user-name">{{ userName() }}</span>
        <span class="global-drawer-goal-badge" [class]="goalBadgeClass()">{{ goalLabel() }}</span>
      </div>
    </div>

    <button
      #closeBtn
      class="global-drawer-close-btn"
      type="button"
      (click)="close()"
      aria-label="Close navigation menu">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="global-drawer-divider" aria-hidden="true"></div>

  <!-- Primary nav items -->
  <nav aria-label="App navigation">
    <a class="global-drawer-item"
       routerLink="/blog"
       routerLinkActive="global-drawer-item--active"
       (click)="close()">
      <mat-icon>article</mat-icon>
      <span>Blog</span>
    </a>
    <a class="global-drawer-item"
       routerLink="/plans"
       routerLinkActive="global-drawer-item--active"
       (click)="close()">
      <mat-icon>fitness_center</mat-icon>
      <span>Plans</span>
    </a>
    <a class="global-drawer-item"
       routerLink="/ai-assistant"
       routerLinkActive="global-drawer-item--active"
       (click)="close()">
      <mat-icon>smart_toy</mat-icon>
      <span>AI Assistant</span>
    </a>
    <a class="global-drawer-item"
       routerLink="/account"
       routerLinkActive="global-drawer-item--active"
       (click)="close()">
      <mat-icon>manage_accounts</mat-icon>
      <span>Account</span>
    </a>
  </nav>

  <div class="global-drawer-divider" aria-hidden="true"></div>

  <!-- Logout -->
  <button
    type="button"
    class="global-drawer-item global-drawer-logout"
    (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Log out</span>
  </button>

</aside>
