<header class="social-topbar" aria-label="beSocial top bar">

  <div class="social-topbar-brand">
    <div class="social-topbar-brand-icon">
      <mat-icon>group</mat-icon>
    </div>
    <span class="social-topbar-wordmark">be<span class="social-topbar-wordmark-gradient">Social</span></span>
  </div>

  <div class="social-topbar-actions">
    <button class="social-topbar-menu-btn" type="button" aria-label="Open menu" (click)="openMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>

</header>

<!-- Backdrop -->
<div
  class="social-menu-backdrop"
  [class.social-menu-backdrop--visible]="menuOpen()"
  (click)="closeMenu()"
  aria-hidden="true"
></div>

<!-- Side drawer -->
<aside class="social-menu-drawer" [class.social-menu-drawer--open]="menuOpen()" aria-label="beSocial menu">

  <div class="social-menu-drawer-header">
    <span class="social-menu-drawer-title">be<span class="social-menu-drawer-title-gradient">Social</span></span>
    <button class="social-menu-close-btn" type="button" aria-label="Close menu" (click)="closeMenu()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <nav class="social-menu-items">

    <button class="social-menu-item social-menu-item--primary" type="button" (click)="onNewPost()">
      <mat-icon>add_circle</mat-icon>
      <span>New</span>
    </button>

    <a class="social-menu-item" routerLink="/dashboard" (click)="closeMenu()">
      <mat-icon>arrow_back</mat-icon>
      <span>Back to NovaFit</span>
    </a>

  </nav>

  <div class="social-menu-drawer-footer">
    <button class="social-menu-item social-menu-item--logout" type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Log Out</span>
    </button>
  </div>

</aside>
