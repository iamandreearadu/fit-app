<div class="history-accordion">
  <button class="history-toggle" type="button"
          (click)="toggle()"
          [attr.aria-expanded]="isOpen()"
          aria-controls="history-panel">
    <mat-icon class="history-chevron" [class.is-open]="isOpen()">chevron_right</mat-icon>
    <span class="history-label">Previous Days</span>
    <span class="history-hint">view your history</span>
  </button>

  @if (isOpen()) {
    <div id="history-panel" class="history-panel">
      <app-previous-daily-user-data />
    </div>
  }
</div>
